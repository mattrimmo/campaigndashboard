name: Daily campaign sync

on:
  schedule:
    # 06:00 UTC daily — adjust if you want it aligned to a different time
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # lets you trigger a manual run from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SOT_API_KEY: ${{ secrets.SOT_API_KEY }}
        run: python scripts/sync.py

      - name: Commit updated data
        run: |
          git config user.name "campaign-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/history.json
          git diff --cached --quiet || git commit -m "Daily sync: $(date -u +%Y-%m-%d)"
          git push
